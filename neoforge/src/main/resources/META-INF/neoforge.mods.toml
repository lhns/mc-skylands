modLoader = "kotori_scala"
# Wildcard per the Kotori316/SLP canonical example — the mod works with any
# kotori_scala language provider. The actual SCF version we develop against
# is pinned in gradle.properties via scf_neoforge_version.
loaderVersion = "[1.0.0,)"
license = "Apache-2.0"
issueTrackerURL = "https://github.com/lhns/mc-skylands/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "Skylands"
authors = "lhns"
description = '''
Adds a Skylands dimension reachable by climbing a beanstalk through the clouds.
'''

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[21.1,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "[1.21.1,1.22)"
ordering = "NONE"
side = "BOTH"
