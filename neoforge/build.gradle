plugins {
    id 'net.neoforged.moddev' version "${moddevgradle_version}"
    id 'scala'
}

// Inline common sources — same pattern as fabric/. MDG reads sourceSets
// verbatim without the architectury-transformer pipeline.
sourceSets {
    main {
        scala.srcDirs += project(':common').file('src/main/scala')
        java.srcDirs  += project(':common').file('src/main/java')
        resources.srcDirs += project(':common').file('src/main/resources')
    }
}

neoForge {
    version = rootProject.neoforge_version

    runs {
        client {
            client()
        }
        server {
            server()
        }
        gameTestServer {
            type = 'gameTestServer'
            // Scope gametest discovery to our namespace so other mods' tests
            // don't run (and fail) alongside ours.
            systemProperty 'neoforge.enabledGameTestNamespaces', rootProject.mod_id
        }
    }

    mods {
        "${mod_id}" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    implementation "org.scala-lang:scala3-library_3:${rootProject.scala_version}"

    // JiJ Scala stdlib so end-user NeoForge installations don't have to
    // install Scala as a separate mod.
    jarJar "org.scala-lang:scala3-library_3:${rootProject.scala_version}"

    // MDG splits the dev-run classpath into two layers: Gradle's runtimeClasspath
    // (fed by `implementation`) and the FML/ModLauncher transforming layer.
    // ModLauncher only auto-promotes artifacts that are themselves mods or
    // declare FMLModType in their manifest — plain libraries like scala3-library
    // are invisible to the mod's runtime classloader. MDG exposes
    // `additionalRuntimeClasspath` precisely for language-runtime libs like this;
    // without it, Skylands init NPEs with `NoClassDefFoundError: scala/Function1`.
    additionalRuntimeClasspath "org.scala-lang:scala3-library_3:${rootProject.scala_version}"
}

processResources {
    inputs.property 'mod_version', rootProject.mod_version
    inputs.property 'mod_id', rootProject.mod_id

    filesMatching('META-INF/neoforge.mods.toml') {
        expand 'mod_version': rootProject.mod_version, 'mod_id': rootProject.mod_id
    }
}
