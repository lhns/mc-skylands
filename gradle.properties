org.gradle.jvmargs=-Xmx4G
org.gradle.daemon=false

mod_id=skylands
mod_version=0.3.0-SNAPSHOT
maven_group=org.lolhens
archives_base_name=skylands

minecraft_version=1.21.1

# Build-plugin versions — each platform uses its own native Gradle plugin.
# Fabric side + common (for IDE Mojmap classpath): Fabric Loom.
# NeoForge side: ModDevGradle.
fabric_loom_version=1.7-SNAPSHOT
moddevgradle_version=2.0.91

fabric_loader_version=0.16.5
fabric_api_version=0.102.0+1.21.1

# Krysztal's Language Scala — maintained fork of fabric-language-scala for MC 1.17+ / Scala 3
# Coordinates: dev.krysztal:krysztal-language-scala:${kls_version}+scala.${kls_scala_version}
# Maven: https://maven.krysztal.dev/releases
kls_version=3.3.0
kls_scala_version=3.3.4

neoforge_version=21.1.72

# Scalable Cat's Force — the Scala 3 language-provider mod for NeoForge.
# 3.5.0-build-1 is the oldest 1.21.1-compatible SCF; 3.6.x/3.7.x add code
# paths requiring NeoForge APIs that aren't in 21.1.x. Pattern lifted from
# mc-fluid-physics/neoforge-1.21.1/gradle.properties.
scf_neoforge_version=3.5.0-build-1

scala_version=3.3.4
